<div class="mb-4 flex justify-end">
	<button
		type="button"
		class="inline-flex items-center gap-1 rounded bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
		(click)="goToCreate()"
	>
		<i class="bi bi-plus-lg"></i> Nouveau framework
	</button>
</div>

<app-framework-table
	[frameworks]="frameworks"
	[total]="total"
	[loading]="loading"
	[first]="first"
	[rows]="rows"
	[sortField]="sortField"
	[sortOrder]="sortOrder"
	[filters]="filters"
	[languageOptions]="languageOptions"
	[typeOptions]="typeOptions"
	(loadRequest)="onLoad($event)"
	(filtersChange)="onFiltersChange($event)"
	(clearRequest)="clearFilters()"
	(rowClick)="goToEdit($event)"
/>
